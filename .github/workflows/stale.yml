name: Close stale issues and PRs

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "stale"
          stale-issue-message: |
            This issue has had no activity in 60 days. It will be closed in 14 days unless updated.
            If still relevant, please comment or add new information.
          close-issue-message: "Closed automatically due to inactivity. Reopen if still relevant."
          exempt-issue-labels: "pinned,security,roadmap,help wanted,good first issue"

          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: "stale"
          stale-pr-message: |
            This PR has had no activity in 30 days. It will be closed in 14 days unless updated.
            Rebase, push, or comment to keep it open.
          close-pr-message: "Closed automatically due to inactivity. Reopen if still relevant."
          exempt-pr-labels: "pinned,security,blocked"

          operations-per-run: 100
