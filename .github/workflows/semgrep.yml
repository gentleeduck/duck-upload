name: Semgrep SAST

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    - cron: "45 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: (github.actor != 'dependabot[bot]')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Semgrep
        run: semgrep ci --sarif --output=semgrep.sarif
        env:
          SEMGREP_RULES: >-
            p/typescript
            p/react
            p/javascript
            p/owasp-top-ten
            p/security-audit
            p/secrets
            p/supply-chain
            p/cwe-top-25
        continue-on-error: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
