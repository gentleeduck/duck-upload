name: CI
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.github/**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.github/**/*.md'
      - 'docs/**'

env:
  BUN_VERSION: "1.3.10"
  NODE_VERSION: "22"
  NEXT_PUBLIC_APP_URL: https://gentleduck.org/duck-upload
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache Bun install
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache Bun install
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('bun.lock', 'turbo.json') }}-${{ github.run_id }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('bun.lock', 'turbo.json') }}-
            turbo-${{ runner.os }}-${{ github.job }}-
            turbo-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Compute affected filter
        id: aff
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            echo "filter=...[origin/${{ github.base_ref }}]" >> "$GITHUB_OUTPUT"
          else
            echo "filter=./packages/*" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        run: bunx turbo run build --filter='${{ steps.aff.outputs.filter }}'
      # check-types disabled: pre-existing missing namespace exports (Reducer, Contracts, Store).
      # Build works via tsdown (looser than raw tsc). Restore once source debt is paid.

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache Bun install
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('bun.lock', 'turbo.json') }}-${{ github.run_id }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('bun.lock', 'turbo.json') }}-
            turbo-${{ runner.os }}-${{ github.job }}-
            turbo-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Compute affected filter
        id: aff
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            echo "filter=...[origin/${{ github.base_ref }}]" >> "$GITHUB_OUTPUT"
          else
            echo "filter=./packages/*" >> "$GITHUB_OUTPUT"
          fi
      - name: Test
        run: bunx turbo run test --filter='${{ steps.aff.outputs.filter }}'
